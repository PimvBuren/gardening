<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <title>Klantzijde Groen & Gewoon Doen</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- HEADER -->
    <header>
        <h2>Groen & Gewoon Doen</h2>

        <nav>
            <a href="index.html">Home</a>
            <span id="orders-link" style="display:none;">
                <a href="mijn-bestellingen.html">Mijn bestellingen</a>
            </span>
            <span id="admin-link" style="display:none;">
                <a href="admin.html">Admin</a>
            </span>
        </nav>

        <div id="user-status">
            <button id="login-btn">Login</button>
            <span id="login-status"></span>
            <button id="logout-btn" style="display:none;">Uitloggen</button>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main>
        <section>
            <h1>Welkom!</h1>
            <p>Bestel uw tuinservice eenvoudig online!</p>
        </section>

        <hr>

        <section>
            <h3>Standaard Pakketten</h3>
            <form class="requires-login" id="pakket-form">
                <label for="pakket">Kies een pakket:</label>
                <select id="pakket" name="pakket">
                    <option value="">-- Kies een pakket --</option>
                    <option value="onderhoud">Tuin onderhoud</option>
                    <option value="snoeien">Snoeien</option>
                    <option value="aanleg">Tuinaanleg</option>
                </select>
                <button type="submit">Bestel</button>
            </form>
            <div id="pakket-result"></div>
        </section>

        <hr>

        <section>
            <h3>Custom Offerte</h3>
            <form class="requires-login" id="offerte-form">
                <label>
                    m² Gras:
                    <input type="number" name="gras" min="0" value="0">
                </label>
                <label>
                    m² Tegels:
                    <input type="number" name="tegels" min="0" value="0">
                </label>
                <label>
                    Meters Heg:
                    <input type="number" name="heg" min="0" value="0">
                </label>
                <label>
                    <input type="checkbox" name="afval"> Afval afvoeren (+€50)
                </label>
                <label>
                    <input type="checkbox" name="spoed"> Spoedservice (+50%)
                </label>
                <button type="submit">Bereken offerte</button>
            </form>
            <div id="offerte-result"></div>
        </section>
    </main>

    <!-- FOOTER -->
    <footer>
        <p>
            <a href="#">Contact</a> |
            <a href="#">Social Media</a> |
            <a href="#">Disclaimer</a>
        </p>
    </footer>

    <!-- LOGIN / REGISTER MODAL -->
    <div id="auth-modal">
        <div class="modal-content">
            <span id="close-modal">✖</span>
            <h3 id="modal-title">Login</h3>
            <input type="text" id="auth-username" placeholder="Username">
            <input type="password" id="auth-password" placeholder="Password">
            <div id="auth-error"></div>
            <button id="auth-submit">Login</button>
            <p style="text-align:center;">
                <span id="toggle-register">Geen account? Register</span>
            </p>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="js/auth.js"></script>
    <script>
        const modal = document.getElementById("auth-modal");
        const closeModal = document.getElementById("close-modal");
        const toggleRegister = document.getElementById("toggle-register");
        const modalTitle = document.getElementById("modal-title");
        const authSubmit = document.getElementById("auth-submit");
        const authUsername = document.getElementById("auth-username");
        const authPassword = document.getElementById("auth-password");
        const authError = document.getElementById("auth-error");

        let registerMode = false;
        let pendingForm = null;

        /* OPEN / CLOSE MODAL */
        document.getElementById("login-btn").addEventListener("click", () => modal.style.display = "flex");
        closeModal.addEventListener("click", () => modal.style.display = "none");

        toggleRegister.addEventListener("click", () => {
            registerMode = !registerMode;
            modalTitle.textContent = registerMode ? "Register" : "Login";
            authSubmit.textContent = registerMode ? "Register" : "Login";
            toggleRegister.textContent = registerMode ? "Al een account? Login" : "Geen account? Register";
            authError.textContent = "";
        });

        /* LOGIN / REGISTER SUBMIT */
        authSubmit.addEventListener("click", async () => {
            const username = authUsername.value.trim();
            const password = authPassword.value.trim();
            if (!username || !password) { authError.textContent = "Vul beide velden in!"; return; }

            let res;
            try { res = registerMode ? await register(username, password) : await login(username, password); }
            catch (e) { authError.textContent = "Server error!"; return; }

            if (res.error) { authError.textContent = res.error; return; }

            modal.style.display = "none";
            authUsername.value = ""; authPassword.value = ""; authError.textContent = "";
            await updateLoginStatus();

            if (pendingForm) {
                if (pendingForm.id === "pakket-form") await handlePakketBestelling(pendingForm);
                if (pendingForm.id === "offerte-form") await handleOfferteBestelling(pendingForm);
                pendingForm = null;
            }
        });

        /* FORM SUBMITS */
        document.querySelectorAll("form.requires-login").forEach(form => {
            form.addEventListener("submit", async (e) => {
                e.preventDefault();
                const user = await checkLogin();
                if (!user) { pendingForm = form; modal.style.display = "flex"; return; }
                if (form.id === "pakket-form") await handlePakketBestelling(form);
                if (form.id === "offerte-form") await handleOfferteBestelling(form);
            });
        });

        /* UPDATE LOGIN STATUS */
        async function updateLoginStatus() {
            const user = await checkLogin();
            const statusEl = document.getElementById("login-status");
            const logoutBtn = document.getElementById("logout-btn");
            const loginBtn = document.getElementById("login-btn");
            const adminLink = document.getElementById("admin-link");
            const ordersLink = document.getElementById("orders-link");

            if (user) {
                statusEl.textContent = `✓ Ingelogd als: ${user.username}`;
                logoutBtn.style.display = "inline-block";
                loginBtn.style.display = "none";
                ordersLink.style.display = "inline";
                adminLink.style.display = user.admin ? "inline" : "none";
            } else {
                statusEl.textContent = "";
                logoutBtn.style.display = "none";
                loginBtn.style.display = "inline-block";
                ordersLink.style.display = "none";
                adminLink.style.display = "none";
            }
        }

        document.getElementById("logout-btn").addEventListener("click", async () => { await logout(); });

        /* HANDLE BESTELLINGEN */
        async function handlePakketBestelling(form) {
            const pakket = form.querySelector('[name="pakket"]').value;
            if (!pakket) { alert("Selecteer eerst een pakket!"); return; }

            const res = await fetch("/bestel-pakket", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ pakket }) });
            const data = await res.json();
            const resultEl = document.getElementById("pakket-result");
            if (data.error) { resultEl.textContent = "Error: " + data.error; resultEl.style.color = "red"; }
            else { resultEl.textContent = `✓ Bestelling geplaatst! Pakket: ${data.order.pakket}`; resultEl.style.color = "green"; form.reset(); }
        }

        async function handleOfferteBestelling(form) {
            const formData = new FormData(form);
            const data = { gras: formData.get("gras"), tegels: formData.get("tegels"), heg: formData.get("heg"), afval: formData.get("afval") === "on", spoed: formData.get("spoed") === "on" };
            const res = await fetch("/bestel-offerte", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(data) });
            const result = await res.json();
            const resultEl = document.getElementById("offerte-result");
            if (result.error) { resultEl.textContent = "Error: " + result.error; resultEl.style.color = "red"; }
            else { resultEl.innerHTML = `✓ Offerte aangevraagd!<br>Geschatte prijs: €${result.prijs}`; resultEl.style.color = "green"; form.reset(); }
        }

        /* INIT */
        updateLoginStatus();
    </script>

</body>

</html>
